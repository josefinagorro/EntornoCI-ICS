<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concert Ticket Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <img class="photo-sticker sticker-1" src="sticker1.jpeg" alt="Harry sticker" />
    <img class="photo-sticker sticker-2" src="sticker 2.jpeg" alt="Harry sticker" />
    <img class="photo-sticker sticker-3" src="sticker3.jpeg" alt="Harry sticker" />
    <img class="photo-sticker sticker-4" src="sticker4.jpeg" alt="Harry sticker" />
    <section class="card">
      <p class="eyebrow">CI/CD Demo</p>
      <h1>Concert Ticket Calculator</h1>
      <p class="subtitle">
        Calculá el precio final de entradas para un concierto.
      </p>

      <form id="ticket-form">
        <label>
          Artista
          <input id="artist" type="text" value="Harry Styles" required />
        </label>

        <label>
          Tipo de entrada
          <select id="ticketType">
            <option value="GENERAL">General</option>
            <option value="CAMPO">Campo</option>
            <option value="VIP">VIP</option>
          </select>
        </label>

        <label>
          Cantidad
          <input id="quantity" type="number" value="2" min="1" required />
        </label>

        <button type="submit">Calcular precio</button>
      </form>

      <div id="result" class="result hidden"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
